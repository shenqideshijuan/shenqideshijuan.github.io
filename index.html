    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        /* 主题变量 (完全保留原版) */
        :root {
            --bg-color: #faf7f2;
            --surface-color: #fffef7;
            --text-color: #2c2b28;
            --text-secondary: #6b6a66;
            --border-color: #e6dfd3;
            --accent: #b97f4b;
            --accent-soft: #d9b48b;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            --header-bg: rgba(250, 247, 242, 0.92);
        }

        body[data-theme="sepia"] {
            --bg-color: #f9efdf;
            --surface-color: #fcf7ed;
            --text-color: #4a3b2a;
            --text-secondary: #7a6852;
            --border-color: #e0cfb5;
            --accent: #b45f2b;
            --header-bg: rgba(249, 239, 223, 0.94);
        }

        body[data-theme="dark"] {
            --bg-color: #1e1e24;
            --surface-color: #2c2c33;
            --text-color: #e8e6e1;
            --text-secondary: #aaa8a0;
            --border-color: #3e3e44;
            --accent: #d9965c;
            --accent-soft: #a5693a;
            --header-bg: rgba(30, 30, 36, 0.94);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Serif SC', system-ui, sans-serif;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .reader-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            height: 56px;
            display: flex;
            align-items: center;
        }

        .header-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo-area {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            letter-spacing: -0.3px;
        }
        .logo {
            font-size: 1.35rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 100%;
        }

        .btn, .dropdown-btn, .file-label.btn, .menu-link {
            background: transparent;
            border: none;
            padding: 0 18px;
            height: 56px;
            line-height: 56px;
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 0;
            text-decoration: none;
        }
        .btn:hover, .dropdown-btn:hover, .menu-link:hover,
        .dropdown-btn.active {
            background-color: #000000;
            color: #ffffff;
            transform: translateY(-1px);
        }
        .btn:active, .dropdown-btn:active {
            transform: translateY(1px);
        }
        .file-label {
            cursor: pointer;
        }
        input[type="file"] {
            display: none;
        }

        .font-size-indicator {
            font-size: 0.8rem;
            font-weight: 500;
            min-width: 44px;
            text-align: center;
            color: var(--accent);
            background: transparent;
            padding: 0 6px;
            height: 56px;
            line-height: 56px;
        }

        .dropdown {
            position: relative;
        }
        .dropdown-btn {
            height: 56px;
            line-height: 56px;
            padding: 0 18px;
            min-width: 100px;
            justify-content: center; 
        }
        .dropdown-menu {
            position: absolute;
            top: 56px;
            left: 0;
            width: 100%;
            background: var(--surface-color);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-top: none;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .dropdown-menu.show {
            display: flex;
            min-width: 100px;
        }
        .dropdown-item {
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
            background: transparent;
            border: none;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s;
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            border-radius: 0;
            white-space: normal;   
            word-break: break-word;
            text-align: center;
        }
        .dropdown-item:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        body[data-theme="dark"] .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .dropdown-item.active {
            background-color: var(--accent-soft);
            color: white;
        }

        .menu-link {
            padding: 0 16px;
        }

        .reading-container {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .book-info {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }
        .book-title {
            font-family: 'Lora', 'Noto Serif SC', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        .book-meta {
            display: flex;
            justify-content: center;
            gap: 28px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Inter', monospace;
        }
        .novel-content {
            background: var(--surface-color);
            border-radius: 0;
            padding: 3rem;
            box-shadow: var(--shadow);
            font-family: 'Lora', 'Noto Serif SC', Georgia, serif;
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--text-color);
        }
        .novel-content p {
            margin-bottom: 1.65rem;
            text-indent: 2em;
        }
        .novel-content h2 {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            font-size: 1.5rem;
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 1.5rem 0;
        }
        .placeholder-message {
            text-align: center;
            padding: 4rem 1.5rem;
            color: var(--text-secondary);
            background: var(--surface-color);
            border-radius: 0;
            font-family: 'Inter', sans-serif;
        }
        .drag-over {
            outline: 2px solid var(--accent);
            background-color: rgba(0, 0, 0, 0.02);
        }
        .footer-bar {
            text-align: center;
            font-size: 0.7rem;
            font-family: 'Inter', monospace;
            color: var(--text-secondary);
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

body[data-theme="dark"] .dropdown-btn:hover,
body[data-theme="dark"] .dropdown-btn.active {
    background-color: var(--text-color);
    color: var(--bg-color);
    transform: translateY(-1px);
    transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* 夜间模式：上传、顶部、返回按钮 hover 翻转 */
body[data-theme="dark"] .btn:hover,
body[data-theme="dark"] .menu-link:hover {
    background-color: var(--text-color);
    color: var(--bg-color);
    transform: translateY(-1px);
    transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
.hero-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}
.hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}
.hero-text h1 {
    font-size: 3.5rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
    color: var(--text-color);
}
.lead {
    font-size: 1.2rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
}
.btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}
.btn {
    padding: 0.75rem 2rem;
    border-radius: 48px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-block;
    font-family: inherit;
    cursor: pointer;
}
.btn-primary {
    background: #3b82f6;
    color: white;
    border: none;
}
.btn-primary:hover {
    background: #2563eb;
    transform: translateY(-2px);
}
.btn-outline {
    border: 1px solid var(--border-color);
    color: var(--text-color);
    background: transparent;
}
.btn-outline:hover {
    border-color: #3b82f6;
    color: #3b82f6;
    transform: translateY(-2px);
}
.img-placeholder {
    background: linear-gradient(145deg, #d9e6f7, #cbdff2);
    border-radius: 40px;
    padding: 2rem;
    text-align: center;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
}
/* 动画类 (复用原 .animate-item 逻辑) */
.animate-item {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
.animate-right {
    transform: translateX(40px);
}
.delay-200 { transition-delay: 0.2s; }
.delay-300 { transition-delay: 0.3s; }
.delay-400 { transition-delay: 0.4s; }
/* 可见状态 */
.hero-section.visible .animate-item {
    opacity: 1;
    transform: translateX(0) translateY(0);
}
@media (max-width: 768px) {
    .hero-grid {
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        text-align: center;
    }
    .hero-text h1 {
        font-size: 2.5rem;
    }
    .btn-group {
        justify-content: center;
    }
}

.second-page .hero-text h1 {
    font-size: 2.6rem;
}
.second-page .hero-text .lead {
    font-size: 1.5rem;
}

.third-page .hero-text h1 {
    font-size: 2.6rem;   
    line-height: 1.4;
    font-weight: 600;
}
.third-page .lead {
    font-size: 1.5rem;
    color: var(--accent);
    margin-top: 0.5rem;
}
.third-page .hero-grid {
    align-items: center;
}
.third-page .hero-grid {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 3rem !important;
}
@media (max-width: 768px) {
    .third-page .hero-grid {
        grid-template-columns: 1fr 1fr !important;  /* 手机上也强制两列 */
        gap: 1.5rem !important;
    }
    .third-page .film-strip {
        max-width: 100%;
    }
}
.film-strip {
    width: 380px;
    max-width: 400px;
    height: 700px;
    overflow: hidden;
    border-radius: 32px;
    box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
    background: #000;
    margin: 0;
    margin-right: auto;
}
.film-images {
    display: flex;
    flex-direction: column;
    animation: verticalScroll 20s linear infinite;
}
.film-img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
    border-bottom: 2px solid rgba(255,255,255,0.2);
}
/* 确保图片高度一致，避免跳动 */
.film-img {
    aspect-ratio: 4 / 3;
}
/* 滚动动画：从顶部移动到底部，利用两组图片实现无缝 */
@keyframes verticalScroll {
    0% {
        transform: translateY(0);
    }
    100% {
        transform: translateY(-50%);
    }
}
/* 响应式调整高度 */
@media (max-width: 768px) {
    .film-strip {
        height: 340px;
        max-width: 400px;
    }
}
@media (max-width: 768px) {
    .third-page .hero-text h1 {
        font-size: 1.8rem;
    }
    .third-page .lead {
        font-size: 1.2rem;
    }
}

.fourth-page .hero-text h1 {
    font-size: 3rem;
    font-weight: 700;
}
@media (max-width: 768px) {
    .fourth-page .hero-text h1 {
        font-size: 2rem;
    }
    .fourth-page .lead {
        font-size: 1rem;
    }
}

.section-title {
    font-size: 2.8rem;
    margin-bottom: 20px;
    color: #f2e2ca;
    font-weight: 300;
    letter-spacing: 2px;
}
.section-subtitle {
    font-size: 1rem;
    margin-bottom: 55px;
    color: #d8c2a2;
    opacity: 0.8;
}
.books-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 45px;
    max-width: 1100px;
    margin: 0 auto;
}


.book {
    width: 190px;
    height: 270px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    /* 模拟厚书的多层阴影 */
    box-shadow: 8px 12px 18px rgba(0, 0, 0, 0.3), 
                0 0 0 1px rgba(210, 180, 140, 0.4) inset,
                0 0 0 3px rgba(0, 0, 0, 0.2);
    border-radius: 4px 8px 8px 4px;
    background: linear-gradient(135deg, #7f6248, #b48c5c);
}

/* 模拟书脊（左侧厚边） */
.book::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 12px;
    height: 100%;
    background: linear-gradient(to right, #5a3e2a, #8b694a);
    border-radius: 2px 0 0 2px;
    box-shadow: -2px 0 4px rgba(0,0,0,0.3);
    z-index: 2;
}

/* 模拟书页（右侧边缘） */
.book::after {
    content: "";
    position: absolute;
    top: 2px;
    right: -3px;
    width: 6px;
    height: calc(100% - 4px);
    background: #e8dcc8;
    border-radius: 0 2px 2px 0;
    box-shadow: 1px 0 3px rgba(0,0,0,0.2);
    z-index: 1;
}

/* 书籍封面内容区域 */
.book-front {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    font-size: 1.2rem;
    font-weight: 500;
    color: #fef3e4;
    font-family: "Microsoft YaHei Light", "微软雅黑", serif;
    position: relative;
    z-index: 3;
    background: inherit; /* 继承渐变背景 */
    border-radius: 4px 8px 8px 4px;
    backdrop-filter: brightness(0.98);
}

/* 悬停效果：轻微上浮 + 阴影加强（无旋转） */
.book:hover {
    transform: translateY(-6px);
    box-shadow: 12px 18px 24px rgba(0, 0, 0, 0.4), 
                0 0 0 1px rgba(230, 200, 140, 0.6) inset;
}

/* 响应式：小屏幕下书籍稍小 */
@media (max-width: 768px) {
    .book {
        width: 140px;
        height: 200px;
    }
    .book::before {
        width: 8px;
    }
    .book-front {
        font-size: 0.95rem;
        padding: 12px;
    }
}


/* 将所有主要内容包裹在一个容器内，并设置为 flex:1 自动撑开 */
.page-content {
    flex: 1;
}

.custom-footer {
    background-color: #000000;
    padding: 50px 20px 40px;
    text-align: center;
    width: 100%;
    margin: 0;
    box-sizing: border-box;
    border: none;
    box-shadow: none;
    margin-top: 0;
}

/* 社交链接样式（保持原样） */
.footer-social {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 38px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}
.footer-social a {
    color: #ddcca8;
    font-size: 1.7rem;
    transition: all 0.25s ease;
    text-decoration: none;
    opacity: 0.85;
}
.footer-social a:hover {
    opacity: 1;
    transform: translateY(-4px);
    color: #f7e5c2;
}
.footer-quote {
    font-size: 0.9rem;
    color: #cfba95;
    max-width: 600px;
    margin: 0 auto;
    font-style: normal;
    letter-spacing: 1px;
    line-height: 1.5;
}

@media (max-width: 768px) {
    .footer-social {
        gap: 24px;
    }
    .footer-social a {
        font-size: 1.4rem;
    }
    .footer-quote {
        font-size: 0.8rem;
        padding: 0 15px;
    }
}

.book.custom-cover .book-front {
    height: 100% !important;
    min-height: 270px !important; 
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-color: transparent !important;
    padding: 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
}

    <script>
        // ---------- 多语言核心 (1:简中 2:繁中 3:English) ----------
let currentLang = '1';

// 语言资源
const i18nDynamic = {
    '1': { 'wordCountLabel': '字数统计' },
    '2': { 'wordCountLabel': '字數統計' },
    '3': { 'wordCountLabel': 'Word Count' }
};

function t(key) {
    return i18nDynamic[currentLang][key] || i18nDynamic['1'][key];
}

// 更新界面静态文本（仅语言下拉按钮的文字）
function updateStaticTexts() {
    document.querySelectorAll('[data-lang1][data-lang2][data-lang3]').forEach(el => {
        const text = el.getAttribute(`data-lang${currentLang}`);
        if (text && el.innerHTML !== text) {
            el.innerHTML = text;
        }
    });
}

// 设置语言
function setLanguage(langCode) {
    if (!['1','2','3'].includes(langCode)) return;
    currentLang = langCode;
    localStorage.setItem('reader_lang', currentLang);
    updateStaticTexts();
}

// 初始化语言
function initLanguage() {
    const savedLang = localStorage.getItem('reader_lang');
    if (savedLang && ['1','2','3'].includes(savedLang)) {
        currentLang = savedLang;
    } else {
        currentLang = '1';
    }
    setLanguage(currentLang);
}

// 下拉菜单交互
function setupDropdown(dropdownElem, btn, menu) {
    if (!dropdownElem || !btn || !menu) return;
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isShow = menu.classList.contains('show');
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        document.querySelectorAll('.dropdown-btn').forEach(b => b.classList.remove('active'));
        if (!isShow) {
            menu.classList.add('show');
            btn.classList.add('active');
        }
    });
    dropdownElem.addEventListener('mouseleave', () => {
        menu.classList.remove('show');
        btn.classList.remove('active');
    });
    menu.addEventListener('click', (e) => e.stopPropagation());
}

// 语言下拉选项绑定
function bindLanguageItems() {
    document.querySelectorAll('#langMenu .dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.stopPropagation();
            const langVal = item.getAttribute('data-lang-code');
            if (langVal) setLanguage(langVal);
            document.getElementById('langMenu').classList.remove('show');
            document.getElementById('langDropdownBtn').classList.remove('active');
        });
    });
}


function initHeroAnimations() {
    const heroSections = document.querySelectorAll('.hero-section');
    const timers = new Map();

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const section = entry.target;
            if (entry.isIntersecting) {
                // 进入视口且达到 threshold 阈值（50%）：清除残留定时器，延迟 0.3 秒后添加 visible 类
                if (timers.has(section)) {
                    clearTimeout(timers.get(section));
                    timers.delete(section);
                }
                const timer = setTimeout(() => {
                    section.classList.add('visible');
                    timers.delete(section);
                }, 300);
                timers.set(section, timer);
            } else {
                // 离开视口：清除定时器，并移除 visible 类（下次进入重新触发动画）
                if (timers.has(section)) {
                    clearTimeout(timers.get(section));
                    timers.delete(section);
                }
                section.classList.remove('visible');
            }
        });
    }, { threshold: 0.5 });  // 改为 0.5，元素露出 50% 时才触发

    heroSections.forEach(section => {
        observer.observe(section);
        // 初始检查：如果页面加载时该 section 已经满足条件，手动触发
        if (section.getBoundingClientRect().top < window.innerHeight * 0.5) {
            setTimeout(() => {
                if (section.getBoundingClientRect().top < window.innerHeight * 0.5) {
                    const timer = setTimeout(() => {
                        section.classList.add('visible');
                    }, 300);
                    timers.set(section, timer);
                }
            }, 100);
        }
    });
}


// 全局点击关闭下拉菜单
window.addEventListener('click', () => {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.dropdown-btn').forEach(b => b.classList.remove('active'));
});

// 初始化
function init() {
    initLanguage();
    const langDropdown = document.getElementById('langDropdown');
    const langBtn = document.getElementById('langDropdownBtn');
    const langMenu = document.getElementById('langMenu');
    if (langDropdown && langBtn && langMenu) {
        setupDropdown(langDropdown, langBtn, langMenu);
    }
    bindLanguageItems();
    initHeroAnimations();
}

init();

<script type="module">
    import * as THREE from 'three';

    // --- 1. 找到容器并设置场景 ---
    const container = document.getElementById('earth-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(0, 0, 7.0); // 相机距离

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setClearColor(0x000000, 0); // 透明背景
    container.appendChild(renderer.domElement);

    // --- 2. 创建一个浅灰白色的半透明球体 ---
    const sphereGeometry = new THREE.SphereGeometry(2.5, 64, 64);
    const sphereMaterial = new THREE.MeshStandardMaterial({
        color: 0xdddddd,        // 浅灰白色
        emissive: 0x222222,
        emissiveIntensity: 0.2,
        roughness: 0.4,
        metalness: 0.1,
        transparent: true,
        opacity: 0.85           // 半透明，隐约透出线条
    });
    const earthSphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(earthSphere);

    // --- 3. 生成经纬线网格 (LineSegments) ---
    // 经线：每隔 15 度一条，纬线：每隔 15 度一条
    const radius = 2.51;        // 比球体略大，避免深度冲突
    const latStep = 15;         // 纬度间隔（度）
    const lonStep = 15;         // 经度间隔（度）
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xaaaaaa }); // 浅灰色线条

    const points = [];

    // 生成纬线（平行圆）：每个纬线是一个圆环
    for (let lat = -75; lat <= 75; lat += latStep) {
        const phi = (90 - lat) * Math.PI / 180;
        const thetaStep = 5 * Math.PI / 180; // 圆的细分
        const ringPoints = [];
        for (let theta = 0; theta <= 2 * Math.PI + 0.1; theta += thetaStep) {
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            ringPoints.push(new THREE.Vector3(x, y, z));
        }
        // 将圆环的点连成线段
        for (let i = 0; i < ringPoints.length - 1; i++) {
            points.push([ringPoints[i], ringPoints[i + 1]]);
        }
    }

    // 生成经线（从北极到南极的半圆）
    for (let lon = 0; lon < 360; lon += lonStep) {
        const theta = lon * Math.PI / 180;
        const meridianPoints = [];
        for (let lat = -85; lat <= 85; lat += 5) { // 细分
            const phi = (90 - lat) * Math.PI / 180;
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            meridianPoints.push(new THREE.Vector3(x, y, z));
        }
        for (let i = 0; i < meridianPoints.length - 1; i++) {
            points.push([meridianPoints[i], meridianPoints[i + 1]]);
        }
    }

    // 创建 LineSegments 几何体
    const lineGeometry = new THREE.BufferGeometry();
    const vertices = [];
    points.forEach(segment => {
        vertices.push(segment[0].x, segment[0].y, segment[0].z);
        vertices.push(segment[1].x, segment[1].y, segment[1].z);
    });
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
    const wireframe = new THREE.LineSegments(lineGeometry, lineMaterial);
    scene.add(wireframe);

    // --- 4. 灯光（让球体有立体感）---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
    backLight.position.set(-5, 0, -5);
    scene.add(backLight);

    // --- 5. 动画：旋转整个球体和线条（一起旋转）---
    function animate() {
        requestAnimationFrame(animate);
        earthSphere.rotation.y += 0.003;
        wireframe.rotation.y += 0.003;
        renderer.render(scene, camera);
    }
    animate();

    // --- 6. 窗口尺寸适配 ---
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        const newWidth = container.clientWidth;
        const newHeight = container.clientHeight;
        camera.aspect = newWidth / newHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(newWidth, newHeight);
    }
</script>
